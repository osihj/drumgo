<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練陣前身心儀式</title>
    <style>
        :root {
            --pogo-blue: #2EB9E6;
            --pogo-teal: #42F5E6;
            --pogo-green: #38D3A0;
            --pogo-red: #FF3847;
            --pogo-red-dark: #C62828;
            --pogo-pink: #FF85A1;
            --pogo-dark: #2C3E50;
            --pogo-white: rgba(255, 255, 255, 0.95);
            --pogo-yellow: #FFCE00;
            --pogo-text-light: #94A3B8;
            --pogo-border-light: #D4EBF2;
        }

        body {
            font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, var(--pogo-blue) 0%, var(--pogo-teal) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .pogo-container {
            background: var(--pogo-white);
            border-radius: 40px;
            padding: 40px 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            border-bottom: 10px solid rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            position: relative;
        }

        header h2 { font-weight: 700; font-size: 1.6rem; margin: 0; color: var(--pogo-dark); }
        header .line { width: 40px; height: 2px; background: var(--pogo-blue); margin: 15px auto; }
        header p { font-size: 0.9rem; color: #7F8C8D; margin: 0 0 30px 0; }

        .section { text-align: left; margin-bottom: 25px; }
        .check-item { 
            display: flex; align-items: center; background: white; 
            margin-bottom: 10px; padding: 14px 16px; border-radius: 20px; 
            font-size: 1rem; box-shadow: 0 4px 0px rgba(0,0,0,0.05); cursor: pointer; 
            transition: transform 0.1s;
        }
        .check-item:active { transform: scale(0.98); }

        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid #BBB; border-radius: 50%; margin-right: 12px; flex-shrink: 0; position: relative; transition: 0.2s; }
        input[type="checkbox"]:checked { background: var(--pogo-green); border-color: var(--pogo-green); transform: scale(1.1); }
        input[type="checkbox"]:checked::after { content: "✓"; color: white; font-size: 14px; position: absolute; left: 4px; top: 0px; }

        .heart-box { 
            background: rgba(255, 255, 255, 0.7); 
            border-radius: 30px; 
            padding: 25px 20px; 
            margin-bottom: 25px; 
            border: 2px solid var(--pogo-border-light); 
            box-shadow: inset 0 2px 10px rgba(46, 185, 230, 0.05);
        }
        
        .heart-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 12px; }
        .heart-rating input { display: none; }
        
        .heart-rating label { 
            cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .heart-icon {
            width: 45px;
            height: 45px;
            fill: #E0E0E0;
            stroke: #E0E0E0;
            stroke-width: 1.5;
            transition: all 0.3s ease;
        }

        .heart-rating input:checked ~ label .heart-icon {
            fill: var(--pogo-red);
            stroke: var(--pogo-red);
            filter: drop-shadow(0 0 10px rgba(255, 56, 71, 0.4));
        }

        .vibrate-effect { animation: heart-beat 0.4s ease; }
        @keyframes heart-beat {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            50% { transform: scale(1.1); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .particle {
            position: absolute;
            width: 8px; height: 8px;
            pointer-events: none;
            border-radius: 50%;
            z-index: 10;
        }

        .btn { 
            background-color: var(--pogo-red); color: white; border: none; 
            padding: 18px; width: 100%; border-radius: 100px; 
            font-size: 1.25rem; font-weight: 800; cursor: pointer; 
            box-shadow: 0 6px 0px var(--pogo-red-dark); letter-spacing: 0.2em; 
            transition: all 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px var(--pogo-red-dark); }

        #result-area { margin-top: 30px; padding: 30px 15px; border-radius: 30px; background: white; display: none; animation: pop 0.4s ease-out; border: 1px solid #eee; }
        .score-display { font-size: 3.5rem; font-weight: 900; color: var(--pogo-red); display: block; margin-bottom: 10px; }

        #wisdom-area {
            margin-top: 40px; padding: 65px 25px 40px; border-radius: 35px; background: #FFFFFF;
            display: none; flex-direction: column; align-items: center; text-align: center;
            border: 4px solid var(--pogo-blue); box-shadow: 10px 10px 0px var(--pogo-teal);
            position: relative; box-sizing: border-box; width: 100%; animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .battery-container { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; z-index: 10; }
        .battery-body { width: 90px; height: 42px; border: 4px solid var(--pogo-dark); background: white; border-radius: 10px; position: relative; padding: 4px; box-sizing: border-box; }
        .battery-head { width: 6px; height: 16px; background: var(--pogo-dark); border-radius: 0 5px 5px 0; }
        .battery-fill { height: 100%; background: var(--pogo-green); width: 0%; border-radius: 3px; transition: width 1.2s ease-in-out; }
        .battery-text { position: absolute; width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 0.85rem; color: var(--pogo-dark); }

        .wisdom-text { font-size: 1.3rem; font-weight: 800; line-height: 1.8; color: var(--pogo-dark); margin: 25px 0; width: 100%; padding: 0 15px; box-sizing: border-box; text-wrap: balance; word-break: break-all; }
        .date-display { margin-top: 15px; font-size: 0.85rem; font-weight: 600; color: var(--pogo-text-light); }

        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="pogo-container">
    <div id="main-ritual">
        <header>
            <h2>練陣前身心儀式</h2>
            <div class="line"></div>
            <p>每一場震撼的鼓聲，始於內心的平靜</p>
        </header>

        <div class="section">
            <label class="check-item"><input type="checkbox" class="task"> 已整理好情緒，今日全神貫注</label>
            <label class="check-item"><input type="checkbox" class="task"> 守護團隊氣氛，互相鼓勵指證</label>
            <label class="check-item"><input type="checkbox" class="task"> 歡喜自願接受任何變化與調整</label>
            <label class="check-item"><input type="checkbox" class="task"> 對自己有信心、耐心、恆心</label>
            <label class="check-item"><input type="checkbox" class="task"> 誠實面對自己，修性修心</label>
        </div>

        <div class="heart-box">
            <span style="font-size: 1.15rem; font-weight: 900; color: var(--pogo-blue); display: block; margin-bottom: 12px; letter-spacing: 0.05em; line-height: 1.5;">灌滿＿顆心能量<br>迎接今日練陣</span>
            <div class="heart-rating">
                <input type="radio" id="5-hearts" name="rating" value="5"><label for="5-hearts" onclick="triggerFeedback(this)">
                    <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </label>
                <input type="radio" id="4-hearts" name="rating" value="4"><label for="4-hearts" onclick="triggerFeedback(this)">
                    <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </label>
                <input type="radio" id="3-hearts" name="rating" value="3"><label for="3-hearts" onclick="triggerFeedback(this)">
                    <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </label>
                <input type="radio" id="2-hearts" name="rating" value="2"><label for="2-hearts" onclick="triggerFeedback(this)">
                    <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </label>
                <input type="radio" id="1-heart" name="rating" value="1"><label for="1-heart" onclick="triggerFeedback(this)">
                    <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </label>
            </div>
        </div>

        <button class="btn" onclick="showAnalysis()">擊鼓開始</button>

        <div id="result-area">
            <span style="font-size: 0.85rem; color: #7F8C8D; display: block; margin-bottom: 5px;">今日身心備戰狀態</span>
            <span id="total-score" class="score-display">0%</span>
            <div id="feedback-content">
                <span id="fb-title" style="font-size: 1.4rem; font-weight: 800; display: block; margin-bottom: 10px;"></span>
                <span id="fb-desc" style="font-size: 1rem; color: #5D6D7E; line-height: 1.6; display: block;"></span>
            </div>
            <button class="btn" style="margin-top: 25px; background: linear-gradient(90deg, #42F5E6, #2EB9E6); box-shadow: 0 6px 0px #2598bd;" onclick="drawWisdom()">領取今日語錄</button>
        </div>
    </div>

    <!-- 語錄區域 -->
    <div id="wisdom-area">
        <div class="battery-container">
            <div class="battery-body">
                <div class="battery-fill" id="battery-fill"></div>
                <div class="battery-text" id="battery-text">0%</div>
            </div>
            <div class="battery-head"></div>
        </div>
        <div class="wisdom-header">
            <span style="letter-spacing: 0.3em; font-weight: 900; color: var(--pogo-blue); font-size: 1.1rem; display: block;">今日語錄</span>
            <div style="height: 3px; background: var(--pogo-teal); width: 50px; margin: 15px auto;"></div>
        </div>
        <div class="wisdom-text" id="wisdom-display"></div>
        <div style="width: 100%;">
            <p style="font-size: 0.8rem; color: #B0BEC5; font-style: italic; margin-bottom: 2px;">讓這份智慧與你的節奏同行</p>
            <div class="date-display" id="date-display"></div>
        </div>
    </div>
</div>

<script>
    let currentScore = 0;

    function triggerFeedback(el) {
        if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
        el.classList.remove('vibrate-effect');
        void el.offsetWidth; 
        el.classList.add('vibrate-effect');

        const box = el.getBoundingClientRect();
        const centerX = box.left + box.width / 2;
        const centerY = box.top + box.height / 2;
        for (let i = 0; i < 8; i++) {
            createParticle(centerX, centerY);
        }
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        document.body.appendChild(p);
        const colors = ['#FF3847', '#FF85A1', '#FFD1DC', '#FFC1CC'];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 6 + 4;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        const destinationX = x + (Math.random() - 0.5) * 150;
        const destinationY = y + (Math.random() - 0.5) * 150;
        const animation = p.animate([
            { transform: `translate(${x}px, ${y}px) scale(1)`, opacity: 1 },
            { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
        ], { duration: 700, easing: 'cubic-bezier(0.1, 0.8, 0.4, 1)' });
        animation.onfinish = () => p.remove();
    }

    const wisdomQuotes = [
        "鼓聲不僅是節奏，<br>更是你靈魂的跳動。",
        "心是鼓的核心，<br>心定則聲正，心靜則氣長。",
        "真正的強大，<br>是在混亂中依然保有節奏。",
        "每一擊都是新的開始，<br>不糾結於上一聲的失誤。",
        "專注於當下這一響，<br>聲音自然會傳達到遠方。",
        "與夥伴的呼吸同步，<br>那才是最強大的陣型。",
        "心穩，手就穩；意到，氣就到。",
        "今日的汗水，<br>會化作舞台上最耀眼的光。",
        "同聲同氣，練的是同一顆心。",
        "練習不是為了完美，<br>是為了遇見更好的自己。",
        "以氣帶力，以心擊鼓，<br>讓每一響都直入人心。",
        "當你放下執著，<br>鼓棒會成為身體的延伸。",
        "鼓棒是你的手，鼓面是你的心，<br>擊出的每一聲都是力量。",
        "讓心氣響徹雲霄，<br>取決於你當下的心量。",
        "讓雜念隨揮動散去，<br>只留下純粹的共振。",
        "節奏感不是技巧，<br>反映在你內在能量的顯化。",
        "順應氣息的起伏，<br>讓鼓聲隨呼吸自然綻放。",
        "每一次的打擊，<br>是對內心恐懼的破除。",
        "心定如山，擊鼓如電，<br>在極靜中爆發最強力量。",
        "讓鼓聲帶走疲憊，<br>讓專注喚醒神采。",
        "你是節奏的源頭，<br>聽從內心指引，擊出你的態度。",
        "身體的柔軟，<br>是為了支撐更剛強的力量。",
        "每一次擊響，<br>是在喚醒生命深處的勇氣。",
        "每一次練陣，<br>是身與心的重新對齊。",
        "快而不亂，專心而不斷，<br>在起落之間掌握節奏。",
        "放下自我的節拍，<br>在共鳴中與夥伴合而為一。",
        "每一次揮棒的弧度，<br>都畫出了心靈的輪廓。",
        "不為表演而打，<br>為誠實地面對自己而打。",
        "內外清澈如鏡，<br>擊鼓即是生命最誠實的回答。",
        "讓每一滴汗水都帶著感謝，<br>獻給此刻的專注。",
        "陣法在腳下，節奏在心中，<br>勇敢走出你的步法。"
    ];

    function showAnalysis() {
        const checkedCount = document.querySelectorAll('.task:checked').length;
        const rating = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
        currentScore = (checkedCount * 12) + (rating * 8);
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        document.getElementById('total-score').innerText = currentScore + '%';
        let title, desc;
        if (currentScore >= 90) { title = "滿格狀態！"; desc = "今日已準備就緒，維持能量繼續前行！"; }
        else if (currentScore >= 70) { title = "能量充沛"; desc = "內心平定，專注力飽滿，讓力量在鼓棒間流動。"; }
        else if (currentScore >= 50) { title = "正在充電"; desc = "心境尚在調和，請透過幾次深呼吸找回節奏。"; }
        else { title = "電量過低"; desc = "目前狀態較為浮躁。建議靜心五分鐘後再開始。"; }
        document.getElementById('fb-title').innerText = title;
        document.getElementById('fb-desc').innerHTML = desc;
        setTimeout(() => {
            const offset = resultArea.offsetTop - 20;
            window.scrollTo({ top: offset, behavior: 'smooth' });
        }, 100);
    }

    function drawWisdom() {
        const randomIndex = Math.floor(Math.random() * wisdomQuotes.length);
        document.getElementById('wisdom-display').innerHTML = wisdomQuotes[randomIndex];
        const fill = document.getElementById('battery-fill');
        document.getElementById('battery-text').innerText = currentScore + '%';
        if(currentScore < 35) fill.style.background = 'var(--pogo-red)';
        else if(currentScore < 75) fill.style.background = 'var(--pogo-yellow)';
        else fill.style.background = 'var(--pogo-green)';
        const now = new Date();
        const year = now.getFullYear() - 1911;
        const month = now.getMonth() + 1;
        const day = now.getDate();
        document.getElementById('date-display').innerText = `${year}.${month}.${day}`;
        document.getElementById('main-ritual').style.display = 'none';
        document.getElementById('wisdom-area').style.display = 'flex';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => { fill.style.width = currentScore + '%'; }, 100);
    }
</script>

</body>
</html>
