<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練陣前身心儀式</title>
    <style>
        :root {
            --pogo-blue: #2EB9E6;
            --pogo-teal: #42F5E6;
            --pogo-green: #38D3A0;
            --pogo-red: #FF3847;
            --pogo-red-dark: #C62828;
            --pogo-dark: #2C3E50;
            --pogo-white: rgba(255, 255, 255, 0.95);
            --pogo-yellow: #FFCE00;
            --pogo-gray: #607D8B;
        }

        body {
            font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, var(--pogo-blue) 0%, var(--pogo-teal) 100%);
            color: var(--pogo-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            letter-spacing: 0.02em;
        }

        .pogo-container {
            background: var(--pogo-white);
            border-radius: 40px;
            padding: 40px 20px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            border-bottom: 10px solid rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        header h2 { font-weight: 600; font-size: 1.7rem; margin: 0; }
        header .line { width: 40px; height: 1px; background: #B8977E; margin: 15px auto; }
        header p { font-size: 0.95rem; color: #7F8C8D; margin: 0 0 35px 0; }

        .section { text-align: left; margin-bottom: 30px; }

        .check-item {
            display: flex;
            align-items: flex-start;
            background: white;
            margin-bottom: 12px;
            padding: 16px 18px;
            border-radius: 25px;
            font-size: 1.05rem;
            line-height: 1.4;
            cursor: pointer;
            box-shadow: 0 4px 0px rgba(0,0,0,0.05);
        }

        input[type="checkbox"] {
            appearance: none;
            width: 20px; height: 20px;
            border: 2px solid #BBB;
            border-radius: 50%;
            margin-right: 12px;
            margin-top: 2px;
            flex-shrink: 0;
            position: relative;
        }

        input[type="checkbox"]:checked { background: var(--pogo-green); border-color: var(--pogo-green); }
        input[type="checkbox"]:checked::after {
            content: "✓"; color: white; font-size: 12px; position: absolute; left: 4px; top: 0px;
        }

        .star-box { background: rgba(255, 255, 255, 0.5); border-radius: 30px; padding: 20px; margin-bottom: 25px; }
        .status-label { font-size: 1rem; font-weight: 600; color: #B8977E; display: block; margin-bottom: 10px; }
        
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 32px; color: #E8E8E8; cursor: pointer; }
        .star-rating input:checked ~ label { color: var(--pogo-yellow); }

        .btn {
            background-color: var(--pogo-red);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 100px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0px var(--pogo-red-dark);
            letter-spacing: 0.2em;
            transition: transform 0.1s;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px var(--pogo-red-dark); }

        .btn-wisdom {
            background: linear-gradient(90deg, #42F5E6, #2EB9E6);
            margin-top: 25px;
            font-size: 1.1rem;
            box-shadow: 0 4px 0px #2598bd;
            display: none;
        }

        #result-area {
            margin-top: 30px;
            padding: 30px 15px;
            border-radius: 35px;
            background: white;
            display: none;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        /* 語錄區塊立體感設計 */
        #wisdom-area {
            margin-top: 40px; /* 留位置給分數圓環 */
            padding: 40px 25px;
            border-radius: 35px;
            background: #FFFFFF;
            display: none;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            border: 4px solid var(--pogo-red-dark);
            box-shadow: 8px 8px 0px var(--pogo-yellow), 15px 15px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 語錄畫面中的分數顯示 */
        .wisdom-score-badge {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--pogo-red);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--pogo-red-dark);
            box-shadow: 4px 4px 0px var(--pogo-dark);
            font-weight: 800;
            z-index: 2;
        }
        .wisdom-score-badge .pct { font-size: 1.4rem; line-height: 1; }
        .wisdom-score-badge .txt { font-size: 0.6rem; margin-top: 2px; letter-spacing: 0; }

        .score-label { font-size: 0.85rem; color: #7F8C8D; display: block; margin-bottom: 5px; }
        .score-display { font-size: 3.5rem; font-weight: 800; color: var(--pogo-red); display: block; margin-bottom: 15px; }

        .wisdom-text {
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.7;
            color: var(--pogo-dark);
            margin: 20px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            white-space: nowrap; 
        }

        @keyframes pop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="pogo-container">
    <div id="main-ritual">
        <header>
            <h2>練陣前身心儀式</h2>
            <div class="line"></div>
            <p>每一場震撼的鼓聲，始於內心的平靜</p>
        </header>

        <div class="section">
            <label class="check-item"><input type="checkbox" class="task"> 已整理好情緒，不將私人情緒帶入練陣期間</label>
            <label class="check-item"><input type="checkbox" class="task"> 具備守護團隊氣氛的自覺，互相鼓勵取代埋怨</label>
            <label class="check-item"><input type="checkbox" class="task"> 保持專注，接受任何變化與調整</label>
            <label class="check-item"><input type="checkbox" class="task"> 對自己有信心、耐心、恆心</label>
            <label class="check-item"><input type="checkbox" class="task"> 接受任何動作調整，誠實面對自己</label>
        </div>

        <div class="star-box">
            <span class="status-label">準備好幾顆星面對今日</span>
            <div class="star-rating">
                <input type="radio" id="5-stars" name="rating" value="5"><label for="5-stars">★</label>
                <input type="radio" id="4-stars" name="rating" value="4"><label for="4-stars">★</label>
                <input type="radio" id="3-stars" name="rating" value="3"><label for="3-stars">★</label>
                <input type="radio" id="2-stars" name="rating" value="2"><label for="2-stars">★</label>
                <input type="radio" id="1-star" name="rating" value="1"><label for="1-star">★</label>
            </div>
        </div>

        <button class="btn" onclick="showAnalysis()">擊鼓開始</button>

        <div id="result-area">
            <span class="score-label">今日身心備戰狀態</span>
            <span class="score-display" id="total-score">0%</span>
            <div id="feedback-content"></div>
            <button class="btn btn-wisdom" id="wisdom-trigger" onclick="drawWisdom()">領取今日語錄</button>
        </div>
    </div>

    <!-- 語錄顯示區 -->
    <div id="wisdom-area">
        <!-- 分數標籤 -->
        <div class="wisdom-score-badge">
            <span class="pct" id="wisdom-score-pct">0%</span>
            <span class="txt">READY</span>
        </div>

        <span class="score-label" style="letter-spacing: 0.3em; font-weight: 900; color: var(--pogo-red-dark); font-size: 1.1rem; margin-top: 10px;">今日語錄</span>
        <div style="height: 3px; background: var(--pogo-yellow); width: 60px; margin: 15px auto;"></div>
        
        <div class="wisdom-text" id="wisdom-display"></div>
        
        <div style="margin-top: 20px;">
            <p style="font-size: 0.85rem; color: #999; font-style: italic;">讓這份智慧與你的節奏同行</p>
        </div>
    </div>
</div>

<script>
    let currentScore = 0; // 全域變數紀錄當前分數

    const wisdomQuotes = [
        "鼓聲不僅是節奏，<br>更是你靈魂的跳動。",
        "心是鼓的核心，<br>心定則聲正，心靜則氣長。",
        "真正的強大，是在混亂中<br>依然保有節奏。",
        "每一擊都是新的開始，<br>不糾結於上一聲的失誤。",
        "專注於當下這一響，<br>聲音自然會傳達到遠方。",
        "與夥伴的呼吸同步，<br>那才是最強大的陣型。",
        "心穩，手就穩；<br>意到，氣就到。",
        "今日的汗水，<br>會化作舞台上最耀眼的光。",
        "同聲同氣，<br>練的是同一顆心。",
        "練習不是為了完美，<br>是為了遇見更好的自己。",
        "以氣帶力，以心擊鼓，<br>讓每一響都直入人心。",
        "當你放下執著，<br>鼓棒會成為身體的延伸。",
        "鼓棒是你的手，鼓面是你的心，<br>擊出的每一聲都是生命的力量。",
        "讓心氣響徹雲霄，<br>取決於你當下的心量。",
        "讓雜念隨揮動散去，<br>只留下純粹的共振。",
        "節奏感不是技巧，<br>而是你內在能量的顯化。",
        "順應氣息的起伏，<br>讓鼓聲隨你的呼吸自然綻放。",
        "每一次的打擊，<br>都是對內心恐懼的破除。",
        "心定如山，擊鼓如電，<br>在極靜中爆發最強的力量。",
        "讓鼓聲帶走疲憊，<br>讓專注喚醒神采。",
        "你是節奏的源頭，<br>聽從內心的指引，擊出你的態度。",
        "身體的柔軟，<br>是為了支撐更剛強的力量。",
        "每一次擊響，<br>都是在喚醒生命深處的勇氣。",
        "每一次練陣，<br>是身與心的重新對齊。",
        "快而不亂，慢而不斷，<br>在起落之間掌握節奏的真意。",
        "放下自意的節拍，<br>在共鳴中與夥伴合而為一。",
        "每一次揮棒的弧度，<br>都畫出了心靈的輪廓。",
        "不為表演而打，<br>為誠實地面對自己而打。",
        "內外清澈如鏡，<br>擊鼓即是生命最誠實的回答。",
        "讓每一滴汗水都帶著感謝，<br>獻給此刻的專注。",
        "陣法在腳下，節奏在心中，<br>勇敢走出你的步法。"
    ];

    function showAnalysis() {
        const checks = document.querySelectorAll('.task:checked').length;
        const checkScore = checks * 12;
        const starRating = document.querySelector('input[name="rating"]:checked')?.value || 0;
        const starScore = starRating * 8;
        currentScore = checkScore + starScore; // 儲存分數

        const resultArea = document.getElementById('result-area');
        const scoreDisplay = document.getElementById('total-score');
        const feedbackContent = document.getElementById('feedback-content');
        const wisdomBtn = document.getElementById('wisdom-trigger');

        resultArea.style.display = 'block';
        scoreDisplay.innerText = currentScore + '%';

        let title, desc;
        if (currentScore === 100) {
            title = "巔峰狀態！";
            desc = "身心已完全合一。今日的每一聲鼓響，都將震撼靈魂。";
        } else if (currentScore >= 80) {
            title = "最良狀態。";
            desc = "內心平定，專注力飽滿。讓力量在鼓棒間流動。";
        } else if (currentScore >= 50) {
            title = "穩定進步。";
            desc = "心境尚在調和。請先透過幾次深呼吸，找回身體與節奏的連結。";
        } else {
            title = "警告：雜訊過多。";
            desc = "目前的狀態較為浮躁。建議先放慢練習速度，將注意力收回到呼吸上。";
        }

        feedbackContent.innerHTML = `
            <span style="display: block; font-size: 1.3rem; font-weight: 800; margin-bottom: 12px;">${title}</span>
            <span style="display: block; font-size: 1rem; line-height: 1.8; color: #5D6D7E; max-width: 90%; margin: 0 auto;">${desc}</span>
        `;
        
        wisdomBtn.style.display = 'block';
        
        setTimeout(() => {
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function drawWisdom() {
        const randomIndex = Math.floor(Math.random() * wisdomQuotes.length);
        document.getElementById('wisdom-display').innerHTML = `<span>「${wisdomQuotes[randomIndex]}」</span>`;
        
        // 同步百分比到語錄畫面
        document.getElementById('wisdom-score-pct').innerText = currentScore + '%';
        
        document.getElementById('main-ritual').style.display = 'none';
        document.getElementById('wisdom-area').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
