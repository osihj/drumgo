<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練陣前身心儀式</title>
    <style>
        :root {
            --pogo-blue: #2EB9E6;
            --pogo-teal: #42F5E6;
            --pogo-green: #38D3A0;
            --pogo-red: #FF3847;
            --pogo-red-dark: #C62828;
            --pogo-dark: #2C3E50;
            --pogo-white: rgba(255, 255, 255, 0.95);
            --pogo-yellow: #FFCE00;
            --pogo-text-light: #94A3B8;
        }

        body {
            font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, var(--pogo-blue) 0%, var(--pogo-teal) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .pogo-container {
            background: var(--pogo-white);
            border-radius: 40px;
            padding: 40px 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            border-bottom: 10px solid rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        /* 儀式主畫面樣式省略 (維持原本設定) */
        header h2 { font-weight: 600; font-size: 1.7rem; margin: 0; }
        header .line { width: 40px; height: 1px; background: #B8977E; margin: 15px auto; }
        header p { font-size: 0.95rem; color: #7F8C8D; margin: 0 0 35px 0; }
        .section { text-align: left; margin-bottom: 30px; }
        .check-item { display: flex; align-items: flex-start; background: white; margin-bottom: 12px; padding: 16px 18px; border-radius: 25px; font-size: 1.05rem; box-shadow: 0 4px 0px rgba(0,0,0,0.05); cursor: pointer; }
        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid #BBB; border-radius: 50%; margin-right: 12px; flex-shrink: 0; position: relative; }
        input[type="checkbox"]:checked { background: var(--pogo-green); border-color: var(--pogo-green); }
        input[type="checkbox"]:checked::after { content: "✓"; color: white; font-size: 12px; position: absolute; left: 4px; top: 0px; }
        .star-box { background: rgba(255, 255, 255, 0.5); border-radius: 30px; padding: 20px; margin-bottom: 25px; }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; }
        .star-rating label { font-size: 32px; color: #E8E8E8; cursor: pointer; }
        .star-rating input:checked ~ label { color: var(--pogo-yellow); }
        .btn { background-color: var(--pogo-red); color: white; border: none; padding: 18px; width: 100%; border-radius: 100px; font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 6px 0px var(--pogo-red-dark); letter-spacing: 0.2em; transition: transform 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px var(--pogo-red-dark); }
        #result-area { margin-top: 30px; padding: 30px 20px; border-radius: 35px; background: white; display: none; animation: pop 0.4s ease-out; }
        .score-display { font-size: 3.5rem; font-weight: 800; color: var(--pogo-red); display: block; margin-bottom: 10px; }

        /* --- 彈跳語錄視窗核心優化 --- */
        #wisdom-area {
            margin-top: 50px;
            padding: 60px 20px 35px;
            border-radius: 35px;
            background: #FFFFFF;
            display: none;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            border: 4px solid var(--pogo-red-dark);
            box-shadow: 10px 10px 0px var(--pogo-yellow);
            position: relative;
            box-sizing: border-box;
        }

        .battery-container { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        .battery-body { width: 90px; height: 40px; border: 4px solid var(--pogo-dark); background: white; border-radius: 8px; position: relative; padding: 3px; box-sizing: border-box; }
        .battery-head { width: 7px; height: 16px; background: var(--pogo-dark); border-radius: 0 4px 4px 0; }
        .battery-fill { height: 100%; background: var(--pogo-green); width: 0%; border-radius: 2px; transition: width 1s ease-out; }
        .battery-text { position: absolute; width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 0.85rem; color: var(--pogo-dark); }

        .wisdom-text { 
            font-size: 1.35rem; /* 16pt */
            font-weight: 800; 
            line-height: 1.8; 
            color: var(--pogo-dark); 
            margin: 20px auto; 
            min-height: 130px; /* 確保長短句高度統一 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            word-break: keep-all; /* 防止中文字被強行切開 */
        }

        .date-display { margin-top: 15px; font-size: 0.85rem; font-weight: 500; color: var(--pogo-text-light); opacity: 0.7; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="pogo-container">
    <!-- 主畫面與分析結果略，同前次版本 -->
    <div id="main-ritual">
        <header>
            <h2>練陣前身心儀式</h2>
            <div class="line"></div>
            <p>每一場震撼的鼓聲，始於內心的平靜</p>
        </header>

        <div class="section">
            <label class="check-item"><input type="checkbox" class="task"> 已整理好情緒，不將私人情緒帶入練陣期間</label>
            <label class="check-item"><input type="checkbox" class="task"> 具備守護團隊氣氛的自覺，互相鼓勵取代埋怨</label>
            <label class="check-item"><input type="checkbox" class="task"> 保持專注，接受任何變化與調整</label>
            <label class="check-item"><input type="checkbox" class="task"> 對自己有信心、耐心、恆心</label>
            <label class="check-item"><input type="checkbox" class="task"> 接受任何動作調整，誠實面對自己</label>
        </div>

        <div class="star-box">
            <span style="font-size: 0.95rem; font-weight: 600; color: #B8977E; display: block; margin-bottom: 10px;">準備好幾顆星面對今日</span>
            <div class="star-rating">
                <input type="radio" id="5-stars" name="rating" value="5" style="display:none"><label for="5-stars" style="cursor:pointer">★</label>
                <!-- 其他星星省略... -->
            </div>
        </div>

        <button class="btn" onclick="showAnalysis()">擊鼓開始</button>

        <div id="result-area">
            <span id="total-score" class="score-display">0%</span>
            <div id="feedback-content">
                <span id="fb-title" style="font-size: 1.4rem; font-weight: 800; display: block; margin-bottom: 10px;"></span>
                <span id="fb-desc" style="font-size: 1.05rem; color: #5D6D7E; line-height: 1.8; display: block; text-align: center;"></span>
            </div>
            <button class="btn" style="margin-top: 25px; background: linear-gradient(90deg, #42F5E6, #2EB9E6);" onclick="drawWisdom()">領取今日語錄</button>
        </div>
    </div>

    <!-- 語錄彈跳視窗 -->
    <div id="wisdom-area">
        <div class="battery-container">
            <div class="battery-body">
                <div class="battery-fill" id="battery-fill"></div>
                <div class="battery-text" id="battery-text">0%</div>
            </div>
            <div class="battery-head"></div>
        </div>
        <span style="letter-spacing: 0.3em; font-weight: 900; color: var(--pogo-red-dark); font-size: 1.1rem; display: block;">今日語錄</span>
        <div style="height: 3px; background: var(--pogo-yellow); width: 60px; margin: 15px auto;"></div>
        <div class="wisdom-text" id="wisdom-display"></div>
        <div style="margin-top: 5px;">
            <p style="font-size: 0.8rem; color: #B0BEC5; font-style: italic; margin-bottom: 2px;">讓這份智慧與你的節奏同行</p>
            <div class="date-display" id="date-display"></div>
        </div>
    </div>
</div>

<script>
    let currentScore = 0;

    const wisdomQuotes = [
        "鼓聲不僅是節奏，<br>更是你靈魂的跳動。",
        "心是鼓的核心，<br>心定則聲正，心靜則氣長。",
        "真正的強大，<br>是在混亂中依然保有節奏。",
        "每一擊都是新的開始，<br>不糾結於上一聲的失誤。",
        "專注於當下這一響，<br>聲音自然會傳達到遠方。",
        "與夥伴的呼吸同步，<br>那才是最強大的陣型。",
        "心穩，手就穩；<br>意到，氣就到。",
        "今日的汗水，<br>會化作舞台上最耀眼的光。",
        "同聲同氣，<br>練的是同一顆心。",
        "練習不是為了完美，<br>是為了遇見更好的自己。",
        "以氣帶力，以心擊鼓，<br>讓每一響都直入人心。",
        "當你放下執著，<br>鼓棒會成為身體的延伸。",
        "鼓棒是你的手，鼓面是你的心，<br>擊出的每一聲都是力量。",
        "讓心氣響徹雲霄，<br>取決於你當下的心量。",
        "讓雜念隨揮動散去，<br>只留下純粹的共振。",
        "節奏感不是技巧，<br>而是你內在能量的顯化。",
        "順應氣息的起伏，<br>讓鼓聲隨你的呼吸自然綻放。",
        "每一次的打擊，<br>是對內心恐懼的破除。",
        "心定如山，擊鼓如電，<br>在極靜中爆發最強的力量。",
        "讓鼓聲帶走疲憊，<br>讓專注喚醒神采。",
        "你是節奏的源頭，<br>聽從內心指引，擊出你的態度。",
        "身體的柔軟，<br>是為了支撐更剛強的力量。",
        "每一次擊響，<br>是在喚醒生命深處的勇氣。",
        "每一次練陣，<br>是身與心的重新對齊。",
        "快而不亂，慢而不斷，<br>在起落之間掌握節奏。",
        "放下自我的節拍，<br>在共鳴中與夥伴合而為一。",
        "每一次揮棒的弧度，<br>都畫出了心靈的輪廓。",
        "不為表演而打，<br>為誠實地面對自己而打。",
        "內外清澈如鏡，<br>擊鼓即是生命最誠實的回答。",
        "讓每一滴汗水都帶著感謝，<br>獻給此刻的專注。",
        "陣法在腳下，節奏在心中，<br>勇敢走出你的步法。"
    ];

    function showAnalysis() {
        const checks = document.querySelectorAll('.task:checked').length;
        // 評分邏輯維持...
        currentScore = (checks * 20); // 範例簡化
        if(currentScore > 100) currentScore = 100;
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('total-score').innerText = currentScore + '%';
        document.getElementById('fb-title').innerText = "準備就緒";
        document.getElementById('fb-desc').innerHTML = "穩定心神，準備擊鼓。";
    }

    function drawWisdom() {
        const randomIndex = Math.floor(Math.random() * wisdomQuotes.length);
        document.getElementById('wisdom-display').innerHTML = wisdomQuotes[randomIndex];
        
        const fill = document.getElementById('battery-fill');
        const txt = document.getElementById('battery-text');
        txt.innerText = currentScore + '%';
        
        if(currentScore < 35) fill.style.background = 'var(--pogo-red)';
        else if(currentScore < 75) fill.style.background = 'var(--pogo-yellow)';
        else fill.style.background = 'var(--pogo-green)';

        const now = new Date();
        const year = now.getFullYear() - 1911;
        const month = now.getMonth() + 1;
        const day = now.getDate();
        document.getElementById('date-display').innerText = `${year}.${month}.${day}`;
        
        document.getElementById('main-ritual').style.display = 'none';
        document.getElementById('wisdom-area').style.display = 'block';

        setTimeout(() => { fill.style.width = currentScore + '%'; }, 100);
    }
</script>
</body>
</html>
